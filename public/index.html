<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyAI — Shaxsiy sun'iy intellekt</title>
<style>
  :root{
    --bg:#f0eee6; --panel:#faf9f5; --ink:#1f1e1c; --muted:#73726c;
    --accent:#cc785c; --accent-2:#d97757; --line:#e3e1d8; --user-av:#6b6a63;
  }
  [data-theme="dark"]{
    --bg:#1f1e1d; --panel:#2a2927; --ink:#f0efe9; --muted:#a3a29b;
    --accent:#d97757; --accent-2:#e08a68; --line:#3a3936; --user-av:#8a8880;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    height:100vh; display:flex; flex-direction:column;
    transition:background .3s,color .3s;
  }
  header{
    padding:14px 22px; display:flex; align-items:center; gap:11px;
    border-bottom:1px solid var(--line);
  }
  .logo{
    width:32px;height:32px;border-radius:8px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:17px;
    box-shadow:0 2px 8px rgba(204,120,92,.3);
  }
  header h1{font-size:17px;font-weight:600;letter-spacing:-.2px}
  header .tag{font-size:11.5px;color:var(--muted);margin-left:6px}
  .theme-btn{
    margin-left:auto;background:none;border:1px solid var(--line);
    width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:15px;
    color:var(--ink);transition:.15s;
  }
  .theme-btn:hover{background:var(--panel)}

  main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
  .wrap{width:100%;max-width:720px;margin:0 auto;padding:24px 20px;flex:1}

  .welcome{text-align:center;margin:auto 0;padding:36px 0;animation:fade .5s ease}
  .welcome .big{
    width:60px;height:60px;border-radius:16px;margin:0 auto 20px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;font-weight:800;
    box-shadow:0 4px 16px rgba(204,120,92,.35);
  }
  .welcome h2{font-size:29px;font-weight:500;letter-spacing:-.5px;margin-bottom:10px;font-family:Georgia,serif}
  .welcome p{color:var(--muted);font-size:15px;max-width:440px;margin:0 auto;line-height:1.6}

  .msg{display:flex;gap:12px;margin-bottom:22px;line-height:1.65;animation:fade .35s ease}
  .msg .av{
    width:28px;height:28px;border-radius:7px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;
  }
  .msg.user .av{background:var(--user-av)}
  .msg.ai .av{background:linear-gradient(135deg,var(--accent),var(--accent-2))}
  .msg .body{padding-top:3px;font-size:15.5px;white-space:pre-wrap;flex:1}
  .msg .who{font-size:12px;color:var(--muted);margin-bottom:2px;font-weight:600}
  .typing{color:var(--muted)}
  .typing::after{content:'▋';animation:blink 1s steps(2) infinite}
  .cursor::after{content:'▋';color:var(--accent);animation:blink 1s steps(2) infinite}
  .source{font-size:12.5px;color:var(--muted);margin-top:8px;padding:7px 11px;background:var(--bg);border:1px solid var(--line);border-radius:9px;display:inline-block}
  .source a{color:var(--accent);text-decoration:none;font-weight:600}
  .source a:hover{text-decoration:underline}
  .badge{font-size:10.5px;padding:2px 7px;border-radius:6px;margin-left:8px;font-weight:600;vertical-align:middle}
  .badge.web{background:rgba(204,120,92,.15);color:var(--accent)}
  .badge.ai{background:rgba(120,120,120,.15);color:var(--muted)}

  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes blink{50%{opacity:0}}

  footer{border-top:1px solid var(--line);background:var(--bg);padding:12px 20px;transition:background .3s}
  .modes{max-width:720px;margin:0 auto 9px;display:flex;gap:6px;justify-content:center}
  .mode-btn{
    border:1px solid var(--line);background:var(--panel);color:var(--muted);
    padding:5px 13px;border-radius:20px;font-size:12.5px;cursor:pointer;font-family:inherit;transition:.15s;
  }
  .mode-btn:hover{border-color:var(--accent)}
  .mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .composer{
    max-width:720px;margin:0 auto;display:flex;align-items:flex-end;gap:8px;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:border .15s;
  }
  .composer:focus-within{border-color:var(--accent)}
  .composer textarea{
    flex:1;border:none;outline:none;resize:none;background:transparent;
    font-family:inherit;font-size:15px;color:var(--ink);max-height:140px;line-height:1.5;
  }
  .send{
    width:34px;height:34px;border:none;border-radius:9px;cursor:pointer;flex-shrink:0;
    background:var(--accent);color:#fff;font-size:16px;transition:background .15s;
  }
  .send:hover{background:var(--accent-2)}
  .send:disabled{background:#c9c7bd;cursor:default}
  .img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:10px}
  .img-grid a{display:block;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--line)}
  .img-grid img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
  .img-grid img:hover{transform:scale(1.05)}
  .news-item{padding:9px 0;border-bottom:1px solid var(--line)}
  .news-item:last-child{border:none}
  .news-item a{color:var(--ink);text-decoration:none;font-weight:600;font-size:14.5px}
  .news-item a:hover{color:var(--accent)}
  .news-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .hint{max-width:720px;margin:8px auto 0;text-align:center;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
  <header>
    <div class="logo">M</div>
    <h1>MyAI</h1>
    <span class="tag">0 dan qurilgan · web qidiruvli</span>
    <button class="theme-btn" id="theme" title="Rejim">🌙</button>
  </header>

  <main id="main">
    <div class="wrap" id="chat">
      <div class="welcome" id="welcome">
        <div class="big">M</div>
        <h2>Salom! Men MyAI</h2>
        <p>Men 0 dan qurilgan neyron tarmoqman. Oddiy gaplashsangiz — o'zim javob beraman; biror narsa so'rasangiz — internetdan (Google) topib beraman.</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="modes">
      <button class="mode-btn active" data-mode="auto">✨ Aqlli</button>
      <button class="mode-btn" data-mode="ai">🧠 MyAI miya</button>
      <button class="mode-btn" data-mode="web">🌐 Web qidiruv</button>
      <button class="mode-btn" data-mode="claude">🤖 Claude</button>
    </div>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Xabar yozing yoki savol bering..."></textarea>
      <button class="send" id="send">↑</button>
    </div>
    <div class="hint">MyAI — o'zimiz qurgan AI 🌱 · Web qidiruv oyiga 250 marta</div>
  </footer>

<script>
const chat=document.getElementById('chat'), welcome=document.getElementById('welcome');
const input=document.getElementById('input'), send=document.getElementById('send');
const main=document.getElementById('main'), themeBtn=document.getElementById('theme');
let MODE='auto';

// Qorong'i rejim
themeBtn.onclick=()=>{
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  themeBtn.textContent=next==='dark'?'☀️':'🌙';
  localStorage.setItem('myai-theme',next);
};
if(localStorage.getItem('myai-theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');themeBtn.textContent='☀️';}

// Rejim tugmalari
document.querySelectorAll('.mode-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); MODE=b.dataset.mode;
  };
});

function addMsg(who,text,cls){
  const m=document.createElement('div');
  m.className='msg '+cls;
  m.innerHTML=`<div class="av">${cls==='user'?'S':'M'}</div>
    <div style="flex:1"><div class="who">${who}</div><div class="body"></div></div>`;
  m.querySelector('.body').textContent=text;
  chat.appendChild(m); main.scrollTop=main.scrollHeight;
  return m.querySelector('.body');
}
function showSource(body,d){
  if(d && d.source){
    const s=document.createElement('div');
    s.className='source';
    s.innerHTML=d.link?`🔗 <a href="${d.link}" target="_blank">${d.source}</a>`:`🔗 ${d.source}`;
    body.parentElement.appendChild(s);
  }
}
function badge(body,mode){
  if(!mode)return;
  const map={web:['web','🌐 web'],ai:['ai','🧠 miya'],news:['web','📰 yangilik'],images:['web','🖼 rasm']};
  const [cls,txt]=map[mode]||['ai',mode];
  const b=document.createElement('span'); b.className='badge '+cls; b.textContent=txt;
  body.parentElement.querySelector('.who').appendChild(b);
}
function renderResult(body,d){
  badge(body,d.mode);
  if(d.mode==='images' && d.items && d.items.length){
    body.textContent='';
    const g=document.createElement('div'); g.className='img-grid';
    d.items.forEach(im=>{
      const a=document.createElement('a'); a.href=im.link||im.original; a.target='_blank';
      const img=document.createElement('img'); img.src=im.thumb||im.original; img.alt=im.title||'';
      a.appendChild(img); g.appendChild(a);
    });
    body.parentElement.appendChild(g);
  }else if(d.mode==='news' && d.items && d.items.length){
    body.textContent='';
    d.items.forEach(n=>{
      const it=document.createElement('div'); it.className='news-item';
      it.innerHTML=`<a href="${n.link}" target="_blank">${n.title}</a>
        <div class="news-meta">${n.source||''}${n.date?' · '+n.date:''}</div>`;
      body.parentElement.appendChild(it);
    });
  }else{
    body.textContent=d.answer||'...';
    showSource(body,d);
  }
}

async function streamAI(body,text,url){
  body.innerHTML='<span class="typing"></span>';
  const r=await fetch(url||'/api/stream',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt:text,temperature:0.7})});
  const reader=r.body.getReader(), dec=new TextDecoder();
  let acc='',out='';
  body.textContent=''; body.classList.add('cursor');
  while(true){
    const {value,done}=await reader.read(); if(done)break;
    acc+=dec.decode(value,{stream:true});
    const parts=acc.split('\n\n'); acc=parts.pop();
    for(const p of parts){
      const line=p.replace(/^data: /,'').trim();
      if(!line||line==='[DONE]')continue;
      try{out+=JSON.parse(line).c;}catch(e){}
      body.textContent=out; main.scrollTop=main.scrollHeight;
    }
  }
  body.classList.remove('cursor');
  if(!out)body.textContent='...';
}

async function ask(){
  const text=input.value.trim(); if(!text)return;
  if(welcome)welcome.remove();
  input.value=''; input.style.height='auto';
  addMsg('Siz',text,'user');
  const body=addMsg('MyAI','','ai');
  send.disabled=true;
  try{
    if(MODE==='ai'){
      await streamAI(body,text);
    }else if(MODE==='claude'){
      body.parentElement.querySelector('.who').appendChild(Object.assign(document.createElement('span'),{className:'badge web',textContent:'🤖 Claude'}));
      await streamAI(body,text,'/api/claude');
    }else if(MODE==='web'){
      body.innerHTML='<span class="typing"></span>';
      const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:text})});
      const d=await r.json(); renderResult(body, d.mode?d:{...d,mode:'web'});
    }else{ // auto
      body.innerHTML='<span class="typing"></span>';
      const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:text})});
      const d=await r.json(); renderResult(body,d);
    }
  }catch(e){ body.textContent='[server bilan aloqa yo\'q]'; }
  send.disabled=false; main.scrollTop=main.scrollHeight; input.focus();
}

send.onclick=ask;
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask();}});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,140)+'px';});
</script>
</body>
</html>
